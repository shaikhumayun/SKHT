<script>
/* ─── IMPROVED GITHUB REPO INTEGRATION ─── */

const LEGAL_FOLDERS = ['bareacts', 'judgments', 'books', 'citations', 'others'];

async function ghScanAllFolders(force = false) {
  if (!_ghConnected || !_ghToken) {
    console.warn("GitHub not connected. Please set Repo and Token in Settings.");
    return;
  }
  
  showToast("🔄 Syncing with GitHub Repository...");

  try {
    let allFetchedFiles = [];

    // Loop through each specific folder in your repo
    const scanPromises = LEGAL_FOLDERS.map(async (folder) => {
      const url = `https://api.github.com/repos/${_ghRepo}/contents/${folder}`;
      const res = await fetch(url, {
        headers: { 
          'Authorization': `token ${_ghToken}`, 
          'Accept': 'application/vnd.github.v3+json' 
        }
      });

      if (res.ok) {
        const items = await res.json();
        return items.filter(item => item.type === 'file').map(file => ({
          id: file.sha,
          name: file.name,
          dlcat: folder, 
          size: (file.size / 1024).toFixed(1) + ' KB',
          date: new Date().toISOString().split('T')[0],
          content: file.download_url, // Link to raw file in repo
          fromGHFolder: true
        }));
      }
      return [];
    });

    const results = await Promise.all(scanPromises);
    allFetchedFiles = results.flat();

    // Get current local files but remove old GitHub-synced entries to avoid dupes
    const localUploads = getSharedUploads().filter(f => !f.fromGHFolder);
    const finalSync = [...localUploads, ...allFetchedFiles];

    // Save to global store and localStorage
    window._LEX_STORE = finalSync;
    localStorage.setItem('lex-shared-uploads', JSON.stringify(finalSync));
    
    // Refresh UI
    updateStats();
    refreshAllUILists();
    showToast("✅ Repo Sync Complete");
    
  } catch (err) {
    console.error("GitHub Sync Error:", err);
    showToast("❌ Sync failed. Check console for details.");
  }
}

function refreshAllUILists() {
  LEGAL_FOLDERS.forEach(cat => {
    if (typeof renderUploadCatList === 'function') renderUploadCatList(cat);
  });
  if (typeof renderDLRecent === 'function') renderDLRecent();
  if (typeof renderDLCat === 'function') renderDLCat();
}

/* ─── UPDATED DELETE LOGIC FOR REPO ─── */
async function ghDeleteFile(fileId, fileName, folder) {
  if (!_ghConnected || !_ghToken) return;
  
  try {
    // 1. Find file SHA if not provided
    const url = `https://api.github.com/repos/${_ghRepo}/contents/${folder}/${fileName}`;
    const res = await fetch(url, {
      headers: { 'Authorization': `token ${_ghToken}` }
    });
    
    if (res.ok) {
      const data = await res.json();
      const deleteRes = await fetch(url, {
        method: 'DELETE',
        headers: {
          'Authorization': `token ${_ghToken}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: `Delete ${fileName} via Portal`,
          sha: data.sha
        })
      });
      if (deleteRes.ok) showToast(`🗑️ Deleted from GitHub: ${fileName}`);
    }
  } catch (err) {
    console.error("Delete error:", err);
  }
}
